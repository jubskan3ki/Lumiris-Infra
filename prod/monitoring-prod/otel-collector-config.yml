---
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: 'lumiris-api'
          metrics_path: /actuator/prometheus
          static_configs:
            - targets: ['lumiris-api:8080']
        - job_name: 'traefik'
          static_configs:
            - targets: ['traefik:8082']
        - job_name: 'node-exporter'
          static_configs:
            - targets: ['node-exporter:9100']
        - job_name: 'cadvisor'
          static_configs:
            - targets: ['cadvisor:8080']

processors:
  batch:
    timeout: 10s
  resourcedetection:
    detectors: [env, system]
  resource:
    attributes:
      - key: deployment.environment
        value: prod
        action: upsert

exporters:
  otlphttp/grafana_metrics:
    endpoint: "${env:GRAFANA_CLOUD_PROM_URL}"
    headers:
      Authorization: "Bearer ${env:GRAFANA_CLOUD_TOKEN}"
  otlphttp/grafana_logs:
    endpoint: "${env:GRAFANA_CLOUD_LOKI_URL}"
    headers:
      Authorization: "Bearer ${env:GRAFANA_CLOUD_TOKEN}"
  otlphttp/grafana_traces:
    endpoint: "${env:GRAFANA_CLOUD_TEMPO_URL}"
    headers:
      Authorization: "Bearer ${env:GRAFANA_CLOUD_TOKEN}"

service:
  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      processors: [resourcedetection, resource, batch]
      exporters: [otlphttp/grafana_metrics]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, resource, batch]
      exporters: [otlphttp/grafana_logs]
    traces:
      receivers: [otlp]
      processors: [resourcedetection, resource, batch]
      exporters: [otlphttp/grafana_traces]
