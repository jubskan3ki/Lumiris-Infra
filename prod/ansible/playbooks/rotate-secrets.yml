---
- name: Lumiris prod — rotate secrets
  hosts: lumiris_prod
  become: true
  gather_facts: false
  tags: [rotate-secrets]
  tasks:
    - name: Re-apply infisical role (re-fetches the identity, no-op if unchanged)
      ansible.builtin.include_role:
        name: infisical

    - name: Re-pull images and restart with fresh env
      ansible.builtin.include_role:
        name: app
      vars:
        app_zero_downtime: true
        app_force_recreate: true
