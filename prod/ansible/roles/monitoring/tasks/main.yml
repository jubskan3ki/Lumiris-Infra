---
- name: Ensure monitoring config directory exists
  ansible.builtin.file:
    path: "{{ monitoring_config_dir }}"
    state: directory
    owner: "{{ monitoring_owner }}"
    group: "{{ monitoring_group }}"
    mode: "0755"

- name: Deploy OTel collector config
  ansible.builtin.template:
    src: otel-collector-config.yml.j2
    dest: "{{ monitoring_config_dir }}/otel-collector-config.yml"
    owner: "{{ monitoring_owner }}"
    group: "{{ monitoring_group }}"
    mode: "0644"

- name: Symlink OTel config into app dir
  ansible.builtin.file:
    src: "{{ monitoring_config_dir }}/otel-collector-config.yml"
    dest: "{{ app_dir }}/monitoring-prod/otel-collector-config.yml"
    state: link
    force: true
