---
- name: Ensure runtime user exists
  ansible.builtin.user:
    name: "{{ infisical_runtime_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present

- name: Ensure /etc/infisical exists with tight perms
  ansible.builtin.file:
    path: "{{ infisical_identity_dir }}"
    state: directory
    owner: "{{ infisical_runtime_user }}"
    group: "{{ infisical_runtime_user }}"
    mode: "0700"

- name: Detect installed infisical version
  ansible.builtin.command: "{{ infisical_install_dir }}/infisical --version"
  register: infisical_version_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: Download Infisical CLI {{ infisical_version }}
  ansible.builtin.get_url:
    url: >-
      https://github.com/Infisical/infisical/releases/download/infisical-cli/v{{ infisical_version }}/infisical_{{
      infisical_version }}_linux_amd64.tar.gz
    dest: /tmp/infisical.tar.gz
    mode: "0644"
  when: infisical_version not in (infisical_version_check.stdout | default(''))

- name: Extract Infisical CLI to {{ infisical_install_dir }}
  ansible.builtin.unarchive:
    src: /tmp/infisical.tar.gz
    dest: "{{ infisical_install_dir }}"
    remote_src: true
    include:
      - infisical
    owner: root
    group: root
    mode: "0755"
  when: infisical_version not in (infisical_version_check.stdout | default(''))

- name: Deploy machine identity credentials
  ansible.builtin.template:
    src: identity.env.j2
    dest: "{{ infisical_identity_dir }}/identity"
    owner: "{{ infisical_runtime_user }}"
    group: "{{ infisical_runtime_user }}"
    mode: "0600"
  no_log: true

- name: Verify universal-auth login succeeds
  ansible.builtin.command: >
    {{ infisical_install_dir }}/infisical login
    --method=universal-auth
    --client-id={{ vault_infisical_client_id }}
    --client-secret={{ vault_infisical_client_secret }}
    --domain={{ infisical_api_url }}
    --plain
    --silent
  register: login_result
  changed_when: false
  no_log: true
  failed_when:
    - login_result.rc != 0
    - "'already logged in' not in (login_result.stderr | default(''))"
