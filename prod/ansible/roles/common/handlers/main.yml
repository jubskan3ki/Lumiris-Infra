---
- name: Restart sshd
  ansible.builtin.service:
    name: ssh
    state: restarted

- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted

- name: Reload ufw
  community.general.ufw:
    state: reloaded

- name: Restart journald
  ansible.builtin.service:
    name: systemd-journald
    state: restarted

- name: Reload unattended-upgrades
  ansible.builtin.service:
    name: unattended-upgrades
    state: restarted
