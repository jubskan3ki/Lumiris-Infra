---
- name: Set timezone to {{ common_timezone }}
  community.general.timezone:
    name: "{{ common_timezone }}"

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - ca-certificates
      - gnupg
      - lsb-release
      - unzip
      - tar
      - git
      - htop
      - jq
      - rsync
      - locales
      - unattended-upgrades
      - ufw
      - fail2ban
      - rclone
      - python3-pip
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure target locale exists — {{ common_locale }}
  community.general.locale_gen:
    name: "{{ common_locale }}"
    state: present

- name: Set system hostname to inventory_hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Ensure /etc/hosts maps the hostname to 127.0.1.1
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s'
    line: "127.0.1.1 {{ inventory_hostname }}"
    state: present

- name: Apply journald limits (cap log volume)
  ansible.builtin.template:
    src: journald.conf.j2
    dest: /etc/systemd/journald.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart journald

- name: Configure unattended-upgrades
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
  when: common_unattended_upgrades

- name: Provision swap
  ansible.builtin.include_tasks: swap.yml

- name: Provision admin users
  ansible.builtin.include_tasks: users.yml

- name: Harden SSH
  ansible.builtin.include_tasks: ssh.yml

- name: Configure firewall
  ansible.builtin.include_tasks: firewall.yml

- name: Configure fail2ban
  ansible.builtin.include_tasks: fail2ban.yml
