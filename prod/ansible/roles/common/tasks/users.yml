---
- name: Ensure admin users exist
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: "{{ item.groups | default(['sudo']) }}"
    append: true
    shell: /bin/bash
    state: present
    create_home: true
  loop: "{{ admin_users }}"
  loop_control:
    label: "{{ item.name }}"

- name: Authorise SSH keys for admin users
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
  loop: "{{ admin_users | subelements('ssh_keys') }}"
  loop_control:
    label: "{{ item.0.name }}"

- name: Grant passwordless sudo to admin users
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"
  loop: "{{ admin_users }}"
  loop_control:
    label: "{{ item.name }}"
