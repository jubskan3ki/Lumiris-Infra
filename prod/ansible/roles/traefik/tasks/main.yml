---
- name: Ensure Traefik config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ traefik_owner }}"
    group: "{{ traefik_group }}"
    mode: "0755"
  loop:
    - "{{ traefik_config_dir }}"
    - "{{ traefik_dynamic_dir }}"

- name: Ensure ACME storage directory
  ansible.builtin.file:
    path: "{{ traefik_acme_dir }}"
    state: directory
    owner: "{{ traefik_owner }}"
    group: "{{ traefik_group }}"
    mode: "0700"

- name: Touch acme.json with 0600
  ansible.builtin.file:
    path: "{{ traefik_acme_dir }}/acme.json"
    state: touch
    owner: "{{ traefik_owner }}"
    group: "{{ traefik_group }}"
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Copy static traefik.yml
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../traefik-prod/traefik.yml"
    dest: "{{ traefik_config_dir }}/traefik.yml"
    owner: "{{ traefik_owner }}"
    group: "{{ traefik_group }}"
    mode: "0644"
  notify: Restart traefik container

- name: Sync dynamic configs
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../traefik-prod/dynamic/"
    dest: "{{ traefik_dynamic_dir }}/"
    owner: "{{ traefik_owner }}"
    group: "{{ traefik_group }}"
    mode: "0644"
    directory_mode: "0755"
  notify: Restart traefik container
