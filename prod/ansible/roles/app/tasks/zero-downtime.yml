---
- name: "Scale +1 with start-first (zero-downtime): {{ item }}"
  ansible.builtin.command: >
    {{ infisical_install_dir | default('/usr/local/bin') }}/infisical run
    --env={{ infisical_env }}
    --path=/backend
    --
    docker compose -f {{ app_compose_file }} up -d --no-deps --scale {{ item }}=2 {{ item }}
  args:
    chdir: "{{ app_dir }}"
  environment:
    IMAGE_TAG: "{{ app_image_tag }}"
    GHCR_OWNER: "{{ ghcr_owner }}"
  loop: "{{ app_services }}"
  loop_control:
    label: "{{ item }}"
  register: scale_up
  changed_when: scale_up.rc == 0

- name: "[ZD] Wait healthy after scale +1"
  ansible.builtin.include_tasks: healthcheck.yml

- name: "Scale back to 1 (drains the older replica): {{ item }}"
  ansible.builtin.command: >
    {{ infisical_install_dir | default('/usr/local/bin') }}/infisical run
    --env={{ infisical_env }}
    --path=/backend
    --
    docker compose -f {{ app_compose_file }} up -d --no-deps --scale {{ item }}=1 {{ item }}
  args:
    chdir: "{{ app_dir }}"
  environment:
    IMAGE_TAG: "{{ app_image_tag }}"
    GHCR_OWNER: "{{ ghcr_owner }}"
  loop: "{{ app_services }}"
  loop_control:
    label: "{{ item }}"
  register: scale_down
  changed_when: scale_down.rc == 0
