---
- name: Ensure app dirs exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ infisical_runtime_user }}"
    group: "{{ infisical_runtime_user }}"
    mode: "0750"
  loop:
    - "{{ app_dir }}"
    - "{{ app_data_dir }}"
    - "{{ app_backup_dir }}"
    - "{{ app_dir }}/traefik-prod"
    - "{{ app_dir }}/traefik-prod/dynamic"
    - "{{ app_dir }}/monitoring-prod"

- name: Sync compose stack
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../docker-compose.prod.yml"
    dest: "{{ app_dir }}/{{ app_compose_file }}"
    owner: "{{ infisical_runtime_user }}"
    group: "{{ infisical_runtime_user }}"
    mode: "0640"

- name: Login to GHCR
  community.docker.docker_login:
    registry_url: ghcr.io
    username: "{{ vault_ghcr_username }}"
    password: "{{ vault_ghcr_pat }}"
    reauthorize: false
  no_log: true

- name: Bring stack up (Infisical-wrapped compose)
  ansible.builtin.include_tasks: compose-up.yml

- name: Wait for healthchecks
  ansible.builtin.include_tasks: healthcheck.yml

- name: Zero-downtime rotation
  ansible.builtin.include_tasks: zero-downtime.yml
  when: app_zero_downtime | bool
