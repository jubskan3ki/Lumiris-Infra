---
- name: Pull fresh images for tag {{ app_image_tag }}
  ansible.builtin.command: >
    {{ infisical_install_dir | default('/usr/local/bin') }}/infisical run
    --env={{ infisical_env }}
    --path=/backend
    --
    docker compose -f {{ app_compose_file }} pull
  args:
    chdir: "{{ app_dir }}"
  environment:
    IMAGE_TAG: "{{ app_image_tag }}"
    GHCR_OWNER: "{{ ghcr_owner }}"
  register: pull_result
  changed_when: "'Downloaded newer image' in pull_result.stdout or 'Pull complete' in pull_result.stdout"

- name: Bring stack up (docker compose up -d)
  ansible.builtin.command: >
    {{ infisical_install_dir | default('/usr/local/bin') }}/infisical run
    --env={{ infisical_env }}
    --path=/backend
    --
    docker compose -f {{ app_compose_file }} up -d {{ '--force-recreate' if app_force_recreate else '' }} --remove-orphans
  args:
    chdir: "{{ app_dir }}"
  environment:
    IMAGE_TAG: "{{ app_image_tag }}"
    GHCR_OWNER: "{{ ghcr_owner }}"
  register: up_result
  changed_when: "'Started' in up_result.stderr or 'Created' in up_result.stderr or 'Recreated' in up_result.stderr"
