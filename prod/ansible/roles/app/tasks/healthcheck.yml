---
- name: Wait for API readiness probe
  ansible.builtin.uri:
    url: "http://127.0.0.1:8080/actuator/health/readiness"
    return_content: false
    status_code: 200
  register: api_health
  retries: "{{ app_healthcheck_retries }}"
  delay: "{{ app_healthcheck_delay }}"
  until: api_health.status == 200
  delegate_to: "{{ inventory_hostname }}"

- name: Wait for each front to respond
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ item.port }}/"
    return_content: false
    status_code: 200
  register: front_health
  retries: "{{ app_healthcheck_retries }}"
  delay: "{{ app_healthcheck_delay }}"
  until: front_health.status == 200
  loop:
    - {name: site, port: 3000}
    - {name: admin, port: 3001}
    - {name: mobile, port: 3002}
    - {name: client, port: 3003}
  loop_control:
    label: "{{ item.name }}"
