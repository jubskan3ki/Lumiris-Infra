---
# Secrets live in `vault.yml` (sops-encrypted).

env: prod

lumiris_domain: lumiris.eu
lumiris_acme_email: ops@lumiris.eu

ssh_port: 2222
ssh_allowed_users:
  - ansible
ssh_password_authentication: false
ssh_permit_root_login: "no"

admin_users:
  - name: ansible
    groups: [sudo, docker]
    ssh_keys:
      # Replace with the public key matching ~/.ssh/lumiris_prod_deploy.
      - "ssh-ed25519 AAAA... ansible@lumiris"

ufw_allowed_ports:
  - {port: 2222, proto: tcp, comment: "SSH"}
  - {port: 80, proto: tcp, comment: "HTTP (ACME challenge + redirect)"}
  - {port: 443, proto: tcp, comment: "HTTPS"}

docker_log_max_size: "50m"
docker_log_max_file: 5
docker_default_address_pools:
  - {base: "172.30.0.0/16", size: 24}

infisical_api_url: https://eu.infisical.com
infisical_project_slug: lumiris
infisical_env: prod
infisical_identity_dir: /etc/infisical
infisical_runtime_user: lumiris

app_dir: /opt/lumiris
app_compose_file: docker-compose.prod.yml
app_image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('latest', true) }}"
ghcr_owner: jubs-kan3ki

backup_postgres_dump_path: /opt/lumiris/backups
backup_r2_bucket: lumiris-backups
backup_keep_days: 14
