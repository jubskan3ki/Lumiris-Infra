# Lumiris local redis config
bind 0.0.0.0
protected-mode yes
port 6379
timeout 0
tcp-keepalive 300
loglevel notice

# Persistance : snapshots seulement (pas d'AOF en dev pour rester rapide)
save 60 1
save 300 10
save 900 100
dir /data
dbfilename dump.rdb

# Auth : password via REDIS_PASSWORD env, passé via --requirepass au démarrage
# (la valeur "requirepass" ici est laissée en placeholder, surchargée par la commande dans docker-compose)
# requirepass lumiris_local_dev_only

# Mémoire
maxmemory 256mb
maxmemory-policy allkeys-lru

# Sécurité dev : pas de commande dangereuse
rename-command FLUSHDB FLUSHDB_LUMIRIS_LOCAL
rename-command FLUSHALL FLUSHALL_LUMIRIS_LOCAL
