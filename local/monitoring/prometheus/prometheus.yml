global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: lumiris

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: lumiris-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          app: lumiris-api
          surface: backend

  - job_name: traefik
    static_configs:
      - targets: ['traefik:8082']
        labels:
          app: traefik

  - job_name: tempo
    static_configs:
      - targets: ['tempo:3200']

  - job_name: loki
    static_configs:
      - targets: ['loki:3100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
