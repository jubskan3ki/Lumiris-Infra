apiVersion: 1

datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus:9090
      isDefault: true
      jsonData:
          httpMethod: POST
          manageAlerts: true
          prometheusType: Prometheus

    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo:3200
      jsonData:
          tracesToLogsV2:
              datasourceUid: loki
              spanStartTimeShift: -1m
              spanEndTimeShift: 1m
              tags:
                  - key: service.name
                    value: service
          serviceMap:
              datasourceUid: prometheus
          nodeGraph:
              enabled: true

    - name: Loki
      type: loki
      access: proxy
      uid: loki
      url: http://loki:3100
      jsonData:
          derivedFields:
              - datasourceUid: tempo
                matcherRegex: '"trace_id":"(\w+)"'
                name: TraceID
                url: '$${__value.raw}'
