services:
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v2.55.1}
    container_name: lumiris-prometheus
    profiles: [monitoring]
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-remote-write-receiver'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - '127.0.0.1:9090:9090'
    networks: [lumiris_local]
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  tempo:
    image: grafana/tempo:${TEMPO_VERSION:-2.6.0}
    container_name: lumiris-tempo
    profiles: [monitoring]
    restart: unless-stopped
    command: ['-config.file=/etc/tempo.yml']
    volumes:
      - ./monitoring/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - '127.0.0.1:3200:3200'
    networks: [lumiris_local]
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  loki:
    image: grafana/loki:${LOKI_VERSION:-3.2.1}
    container_name: lumiris-loki
    profiles: [monitoring]
    restart: unless-stopped
    command: ['-config.file=/etc/loki/local-config.yaml']
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - '127.0.0.1:3100:3100'
    networks: [lumiris_local]
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  promtail:
    image: grafana/promtail:${PROMTAIL_VERSION:-3.2.1}
    container_name: lumiris-promtail
    profiles: [monitoring]
    restart: unless-stopped
    command: ['-config.file=/etc/promtail/config.yml']
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks: [lumiris_local]
    depends_on:
      - loki

  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_VERSION:-0.111.0}
    container_name: lumiris-otel-collector
    profiles: [monitoring]
    restart: unless-stopped
    command: ['--config=/etc/otel/config.yml']
    volumes:
      - ./monitoring/otel/otel-collector-config.yml:/etc/otel/config.yml:ro
    ports:
      - '127.0.0.1:4317:4317'
      - '127.0.0.1:4318:4318'
      - '127.0.0.1:8889:8889'
    networks: [lumiris_local]
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - tempo
      - loki
      - prometheus

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.3.1}
    container_name: lumiris-grafana
    profiles: [monitoring]
    restart: unless-stopped
    depends_on:
      - prometheus
      - tempo
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Admin'
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
      GF_FEATURE_TOGGLES_ENABLE: 'traceqlEditor'
      GF_INSTALL_PLUGINS: 'grafana-piechart-panel'
      GF_SERVER_ROOT_URL: https://grafana.lumiris.local
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '127.0.0.1:3030:3000'
    networks: [lumiris_local]
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`grafana.lumiris.local`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls=true
      - traefik.http.services.grafana.loadbalancer.server.port=3000

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION:-v0.49.1}
    container_name: lumiris-cadvisor
    profiles: [monitoring]
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - '127.0.0.1:8088:8080'
    networks: [lumiris_local]

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION:-v1.8.2}
    container_name: lumiris-node-exporter
    profiles: [monitoring]
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - '127.0.0.1:9100:9100'
    networks: [lumiris_local]

networks:
  lumiris_local:
    external: true
    name: lumiris_lumiris_local

volumes:
  prometheus-data:
  tempo-data:
  loki-data:
  grafana-data:
