---
services:
  pgadmin:
    image: dpage/pgadmin4:${PGADMIN_VERSION:-8.13}
    container_name: lumiris-pgadmin
    profiles: [tools]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@lumiris.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_LISTEN_PORT: 80
    depends_on:
      postgres:
        condition: service_healthy
    networks: [lumiris_local]
    labels:
      - traefik.enable=true
      - traefik.http.routers.pgadmin.rule=Host(`pgadmin.lumiris.local`)
      - traefik.http.routers.pgadmin.entrypoints=websecure
      - traefik.http.routers.pgadmin.tls=true
      - traefik.http.services.pgadmin.loadbalancer.server.port=80

  redis-commander:
    image: rediscommander/redis-commander:${REDIS_COMMANDER_VERSION:-latest}
    container_name: lumiris-redis-commander
    profiles: [tools]
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-lumiris_local_dev_only}
    depends_on:
      redis:
        condition: service_healthy
    networks: [lumiris_local]
    labels:
      - traefik.enable=true
      - traefik.http.routers.redis-commander.rule=Host(`redis.lumiris.local`)
      - traefik.http.routers.redis-commander.entrypoints=websecure
      - traefik.http.routers.redis-commander.tls=true
      - traefik.http.services.redis-commander.loadbalancer.server.port=8081

networks:
  lumiris_local:
    external: true
    name: lumiris_lumiris_local
