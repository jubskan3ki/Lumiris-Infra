---
# Replace placeholder age keys with real ops recipients; generate via `age-keygen -o ~/.config/sops/age/keys.txt`.
creation_rules:
  - path_regex: secrets/.*\.(ya?ml|env|json)$
    encrypted_regex: '^(password|secret|key|token|dsn|url)$'
    age: >-
      age1placeholderopskey0000000000000000000000000000000000000000aaaa,
      age1placeholderbackup00000000000000000000000000000000000000000bbbb
