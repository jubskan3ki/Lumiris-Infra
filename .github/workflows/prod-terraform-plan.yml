---
# INERT until SOPS_AGE_KEY and Cloudflare credentials are provisioned.

name: prod-terraform-plan

on:
  workflow_dispatch:
    inputs:
      destroy:
        description: "Generate a destroy plan instead of an apply plan"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: prod-terraform-plan
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install sops
        run: |
          curl -fsSL -o /tmp/sops https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          chmod +x /tmp/sops
          sudo mv /tmp/sops /usr/local/bin/sops
          sops --version

      - name: Materialise age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          printf '%s\n' "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt
          echo "SOPS_AGE_KEY_FILE=$HOME/.config/sops/age/keys.txt" >> "$GITHUB_ENV"

      - name: Decrypt bootstrap secrets
        run: |
          sops --decrypt secrets/prod.env.sops.yaml > /tmp/bootstrap.yml
          python3 - <<'PY' >> "$GITHUB_ENV"
          import yaml
          with open('/tmp/bootstrap.yml') as f:
              data = yaml.safe_load(f)
          print(f"TF_VAR_cloudflare_api_token={data['cloudflare']['api_token']}")
          print(f"TF_VAR_cloudflare_account_id={data['cloudflare']['account_id']}")
          print(f"TF_VAR_grafana_cloud_api_key={data['grafana_cloud']['api_key']}")
          print(f"TF_VAR_vps_ip={data['vps']['ip']}")
          print(f"TF_VAR_contact_email=ops@lumiris.eu")
          print(f"TF_VAR_domain=lumiris.eu")
          PY
          shred -u /tmp/bootstrap.yml

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.0"
          terraform_wrapper: false

      - name: terraform init
        working-directory: prod/terraform
        run: terraform init -input=false -no-color

      - name: terraform plan
        working-directory: prod/terraform
        run: |
          ARGS=(-input=false -no-color -out=tfplan.bin)
          if [[ "${{ inputs.destroy }}" == "true" ]]; then
            ARGS+=(-destroy)
          fi
          terraform plan "${ARGS[@]}"
          terraform show -no-color tfplan.bin > tfplan.txt

      - name: Surface plan in job summary
        working-directory: prod/terraform
        run: |
          {
            echo '## Terraform plan'
            echo '```'
            head -c 60000 tfplan.txt
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
